spring.application.name=uptc

# ── Base de datos ──────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER_NAME}
spring.datasource.password=${DB_PASSWORD}

# ── JPA ────────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.web.error.include-message=always
server.port=8080

# colors in the terminal
spring.output.ansi.enabled=ALWAYS

# ── Actuator + Monitoreo ───────────────────────────────────────────────────────
# Exponer todos los endpoints de actuator (health, info, prometheus, metrics, etc.)
management.endpoints.web.exposure.include=health,info,prometheus,metrics,env
management.endpoint.health.show-details=always

# Endpoint base de actuator (por defecto /actuator)
management.endpoints.web.base-path=/actuator

# Habilitar métricas de JVM, HTTP requests, datasource, etc.
management.metrics.enable.all=true

# Exponer el endpoint de Prometheus para que Prometheus haga scraping
management.prometheus.metrics.export.enabled=true
